<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Каталог • LADIdance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --soft-white: #ffffff;
            --blush: #fff5f5;
            --rose: #fce4ec;
            --petal: #f8bbd0;
            --pink-soft: #f48fb1;
            --pink-deep: #e91e63;
            --pale: #fce4ec;
            --shadow-soft: 0 20px 35px rgba(245, 190, 200, 0.15), 0 6px 12px rgba(0,0,0,0.03);
            --shadow-card: 0 25px 45px rgba(240, 180, 190, 0.25), 0 5px 15px rgba(0,0,0,0.05);
            --border-light: #ffe6eb;
            --text-dark: #4a2c2c;
            --text-soft: #7a5a5a;
            --radius-large: 36px;
            --radius-medium: 24px;
            --transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #fff9fb;
            color: var(--text-dark);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container { max-width: 1320px; margin: 0 auto; padding: 0 28px; }

        @keyframes softFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* header */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            box-shadow: 0 5px 20px rgba(235, 180, 190, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 34px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            letter-spacing: -0.5px;
        }
        .logo-part1 { color: var(--pink-deep); font-weight: 800; }
        .logo-part2 { color: var(--text-dark); }
        nav ul {
            display: flex;
            list-style: none;
            gap: 12px;
            flex-wrap: wrap;
        }
        nav ul li a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 40px;
            transition: var(--transition);
            background: transparent;
            font-size: 15px;
        }
        nav ul li a:hover {
            background: var(--rose);
            color: var(--pink-deep);
        }
        .header-icons {
            display: flex;
            gap: 18px;
            align-items: center;
        }
        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--blush);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--pink-deep);
            font-size: 20px;
            text-decoration: none;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            position: relative;
        }
        .icon-btn:hover {
            background: #f8bbd0;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 12px 22px rgba(233, 30, 99, 0.2);
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e91e63;
            color: white;
            min-width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
            animation: gentlePulse 2.5s infinite;
        }

        /* catalog header */
        .catalog-header {
            text-align: center;
            padding: 50px 0 30px;
        }
        .catalog-header h1 {
            font-size: clamp(36px, 5vw, 56px);
            font-weight: 700;
            background: linear-gradient(135deg, #e91e63, #c2185b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .catalog-header p {
            color: var(--text-soft);
            font-size: 18px;
        }

        /* search & filters */
        .search-bar {
            display: flex;
            gap: 14px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .search-input {
            padding: 15px 24px;
            border: 2px solid #f8bbd0;
            border-radius: 50px;
            width: 320px;
            font-family: inherit;
            font-size: 15px;
            background: white;
            transition: var(--transition);
        }
        .search-input:focus {
            outline: none;
            border-color: #e91e63;
            box-shadow: 0 0 0 4px rgba(233,30,99,0.1);
        }
        .filter-btn {
            padding: 13px 26px;
            border-radius: 50px;
            border: 2px solid #f8bbd0;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-family: inherit;
            color: var(--text-dark);
        }
        .filter-btn.active, .filter-btn:hover {
            background: #e91e63;
            color: white;
            border-color: #e91e63;
            box-shadow: 0 10px 20px rgba(233,30,99,0.2);
        }

        /* products grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
            margin: 30px 0 60px;
        }
        .product-card {
            background: white;
            border-radius: 34px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-12px);
        }
        .product-img {
            height: 300px;
            background: linear-gradient(145deg, #ffeef2, #ffe0e6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            color: #e91e63;
            overflow: hidden;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-info {
            padding: 24px;
            text-align: center;
        }
        .product-name {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .current-price {
            color: #e91e63;
            font-weight: 700;
            font-size: 22px;
        }
        .add-to-cart-btn {
            width: 100%;
            padding: 14px;
            background: #fff0f3;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 15px;
            color: #4a2c2c;
            font-family: inherit;
            font-size: 15px;
        }
        .add-to-cart-btn:hover {
            background: #e91e63;
            color: white;
        }

        /* modal */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: white;
            border-radius: 36px;
            padding: 35px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }
        .modal-close {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #fff0f3;
            border: none;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #e91e63;
            transition: var(--transition);
        }
        .modal-close:hover { background: #e91e63; color: white; }
        .modal .swiper {
            border-radius: 24px;
            margin-bottom: 24px;
        }
        .modal .swiper-slide {
            height: 350px;
            background: linear-gradient(145deg, #ffeef2, #ffe0e6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: #e91e63;
            border-radius: 24px;
            overflow: hidden;
        }
        .modal .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff5f7;
        }
        .modal .swiper-slide video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        #modal-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        #modal-desc {
            color: var(--text-soft);
            margin: 12px 0;
            line-height: 1.6;
            white-space: normal;
            word-break: break-word;
        }
        #modal-price {
            font-size: 26px;
            font-weight: 700;
            color: #e91e63;
            margin-top: 8px;
        }

        /* cart sidebar */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .cart-overlay.active { opacity: 1; visibility: visible; }
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -450px;
            width: 420px;
            height: 100%;
            background: white;
            z-index: 3100;
            transition: 0.35s ease;
            box-shadow: -10px 0 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            border-radius: 30px 0 0 30px;
        }
        .cart-sidebar.active { right: 0; }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px;
            border-bottom: 1px solid #ffe6eb;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .cart-item {
            display: flex;
            gap: 15px;
            padding: 16px;
            background: #fff5f7;
            border-radius: 20px;
            margin-bottom: 12px;
            align-items: center;
        }
        .cart-footer {
            padding: 25px;
            border-top: 1px solid #ffe6eb;
        }
        .cart-checkout-btn {
            width: 100%;
            padding: 16px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            font-size: 16px;
        }
        .cart-checkout-btn:hover {
            background: #c2185b;
            transform: translateY(-2px);
        }
        .qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #f8bbd0;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
        }
        .qty-btn:hover { background: #e91e63; color: white; border-color: #e91e63; }

        .toast {
            position: fixed;
            bottom: 35px;
            right: 35px;
            background: white;
            padding: 16px 28px;
            border-radius: 40px;
            box-shadow: 0 25px 45px rgba(233,30,99,0.25);
            z-index: 9999;
            font-weight: 600;
            animation: fadeSlide 0.3s ease;
        }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; gap: 12px; }
            .cart-sidebar { width: 100%; border-radius: 0; }
            .search-bar { flex-direction: column; align-items: center; }
            .search-input { width: 100%; }
        }
    </style>
</head>

        function getFirstImage(product) {
            if (product.images && product.images.length > 0) return product.images[0];
            if (product.image) return product.image;
            return '';
        }

        function saveCart() { localStorage.setItem('ladidance_cart', JSON.stringify(cart)); renderCart(); }

        function addToCart(name, price, image) {
            if (price === 0 || price === 'Договорная') {
                showToast('❌ Для этого товара цена договорная, оформите заказ через Telegram');
                return;
            }
            const numericPrice = typeof price === 'number' ? price : parseInt(price, 10);
            const exist = cart.find(i => i.name === name);
            exist ? exist.quantity++ : cart.push({ name, price: numericPrice, image: image || '', quantity: 1 });
            saveCart();
            showToast('🩰 ' + name + ' добавлен');
        }

        function removeFromCart(index) { cart.splice(index, 1); saveCart(); }
        
        function updateQuantity(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            saveCart();
        }

        window.cartRemoveItem = removeFromCart;
        window.cartUpdateQuantity = updateQuantity;

            const count = cart.reduce((s, i) => s + i.quantity, 0);
            const countEl = document.getElementById('cart-count');
            const footer = document.getElementById('cart-footer');
            const itemsContainer = document.getElementById('cart-items');

            countEl.textContent = count;
            
            if (count === 0) {
                footer.style.display = 'none';

                        <div class="cart-item">
                            <div style="width:50px; height:50px; border-radius:50%; overflow:hidden; background:#ffe0e6;">
                                ${item.image 
                                    ? `<img src="${item.image}" alt="${item.name}" style="width:100%; height:100%; object-fit:cover;">`
                                    : `<i class="fas fa-box" style="color:#e91e63; display:flex; align-items:center; justify-content:center; height:100%;"></i>`
                                }
                            </div>
                            <div style="flex:1;">
                                <div style="font-weight:600;">${item.name}</div>
                                <div style="color:#e91e63; font-weight:700;">${(item.price * item.quantity).toLocaleString()} ₽</div>
                                <div style="display:flex; gap:8px; align-items:center; margin-top:6px;">
                                    <button class="qty-btn" onclick="window.cartUpdateQuantity(${idx}, -1)">−</button>
                                    <span>${item.quantity}</span>
                                    <button class="qty-btn" onclick="window.cartUpdateQuantity(${idx}, 1)">+</button>
                                </div>
                            </div>
                            <button onclick="window.cartRemoveItem(${idx})" style="color:#ff4444; background:none; border:none; cursor:pointer; font-size:16px;">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>`;
                });
                document.getElementById('cart-total-price').textContent = total.toLocaleString() + ' ₽';
            }
        }

        function toggleCart() {
            document.getElementById('cart-overlay').classList.toggle('active');
            document.getElementById('cart-sidebar').classList.toggle('active');
        }

        function openModal(product) {
            selectedProduct = product;
            document.getElementById('modal-name').textContent = product.name;
            const descContainer = document.getElementById('modal-desc');
            if (product.desc) {
                descContainer.innerHTML = product.desc;
            } else {
                descContainer.textContent = '';
            }
            
            const priceValue = (product.customPriceText || product.price === 0) 
                ? (product.customPriceText || 'Договорная') 
                : product.price.toLocaleString() + ' ₽';
            document.getElementById('modal-price').textContent = priceValue;
            document.getElementById('product-modal').classList.add('active');
            
            const swiperWrapper = document.querySelector('#modal-swiper .swiper-wrapper');
            swiperWrapper.innerHTML = '';

            if (product.video && product.video.trim() !== '') {
                swiperWrapper.innerHTML += `
                    <div class="swiper-slide" style="background:#000;">
                        <video src="${product.video}" controls playsinline 
                            style="width:100%; height:100%; object-fit:contain; background:#000;">
                        </video>
                    </div>`;
            }

            if (product.images && product.images.length > 0) {
                product.images.forEach(imgSrc => {
                    if (imgSrc && imgSrc.trim() !== '') {
                        swiperWrapper.innerHTML += `
                            <div class="swiper-slide">
                                <img src="${imgSrc}" alt="${product.name}" style="object-fit:contain; background:#fff5f7;">
                            </div>`;
                    }
                });
            } else if (product.image) {
                swiperWrapper.innerHTML += `
                    <div class="swiper-slide">
                        <img src="${product.image}" alt="${product.name}" style="object-fit:cover;">
                    </div>`;
            } else {
                swiperWrapper.innerHTML += `
                    <div class="swiper-slide">
                        <i class="fas ${product.icon || 'fa-box'}" style="font-size: 80px;"></i>
                    </div>`;
            }

            if (modalSwiper) {
                modalSwiper.destroy(true, true);
                modalSwiper = null;
            }

            const slideCount = swiperWrapper.children.length;
            modalSwiper = new Swiper('#modal-swiper', {
                loop: slideCount > 1,
                pagination: { el: '.swiper-pagination', clickable: true },
                autoplay: slideCount > 1 ? { delay: 3000, disableOnInteraction: false } : false
            });
        }

        function closeModal() {
            document.getElementById('product-modal').classList.remove('active');
            const videos = document.querySelectorAll('#modal-swiper video');
            videos.forEach(v => v.pause());
        }

        document.getElementById('modal-close-btn').addEventListener('click', closeModal);
        
        document.getElementById('product-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        document.getElementById('modal-add-btn').addEventListener('click', () => {
            if (selectedProduct) {
                const img = getFirstImage(selectedProduct);
                let priceToUse = selectedProduct.price;
                if (selectedProduct.customPriceText || selectedProduct.price === 0) {
                    showToast('❌ Договорная цена, напишите в Telegram для заказа');
                    return;
                }
                addToCart(selectedProduct.name, priceToUse, img);
                closeModal();
            }
        });

        document.getElementById('cart-toggle-btn').addEventListener('click', toggleCart);
        document.getElementById('cart-close-btn').addEventListener('click', toggleCart);
        document.getElementById('cart-overlay').addEventListener('click', toggleCart);

        document.getElementById('checkout-btn').addEventListener('click', () => {
            if (!cart.length) return;
            let msg = 'Здравствуйте! Хочу заказать:%0A%0A';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.quantity;
                msg += `— ${item.name} (×${item.quantity}): ${(item.price * item.quantity).toLocaleString()} ₽%0A`;
            });
            msg += `%0AИтого: ${total.toLocaleString()} ₽%0A%0AПожалуйста, свяжитесь со мной.`;
            window.open(`https://t.me/${adminTelegram}?text=${msg}`, '_blank');
        });

        function renderProducts() {
            const query = document.getElementById('search').value.toLowerCase();
            let filtered = allProducts.filter(p => 
                (currentFilter === 'all' || p.category.toLowerCase() === currentFilter.toLowerCase()) &&
                p.name.toLowerCase().includes(query)
            );
            
            document.getElementById('grid').innerHTML = filtered.map(p => {
                const firstImg = getFirstImage(p);
                const priceDisplay = (p.customPriceText || p.price === 0) ? 'Договорная' : p.price.toLocaleString() + ' ₽';
                // важно: экранируем данные для data-product
                const productData = {
                    ...p,
                    price: typeof p.price === 'number' ? p.price : 0,
                    customPriceText: p.customPriceText || (p.price === 0 ? 'Договорная' : null)
                };
                return `
                <div class="product-card" data-product='${JSON.stringify(productData).replace(/'/g, "&#39;")}'>
                    <div class="product-img">
                        ${firstImg 
                            ? `<img src="${firstImg}" alt="${p.name}">`
                            : `<i class="fas ${p.icon || 'fa-box'}"></i>`
                        }
                    </div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="current-price">${priceDisplay}</div>
                        <button class="add-to-cart-btn" data-name="${p.name}" data-price="${p.price}" data-image="${firstImg}" ${p.price === 0 || p.customPriceText ? 'data-dogovor="true"' : ''}>
                            <i class="fas fa-shopping-cart"></i> В корзину
                        </button>
                    </div>
                </div>`;
            }).join('');

            document.querySelectorAll('.product-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    if (e.target.closest('.add-to-cart-btn')) return;
                    try {
                        const product = JSON.parse(this.dataset.product);
                        openModal(product);
                    } catch(err) { console.warn(err); }
                });
            });

            document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const { name, price, image, dogovor } = this.dataset;
                    if (dogovor === 'true' || price === '0' || price === 'Договорная') {
                        showToast('❌ Цена договорная, напишите нам в Telegram');
                        return;
                    }
                    addToCart(name, +price, image);
                });
            });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderProducts();
            });
        });

        document.getElementById('search').addEventListener('input', renderProducts);
        
        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 300);
            }, 2500);
        }

        renderCart();
        renderProducts();
    })();
</script>
</body>
</html>
